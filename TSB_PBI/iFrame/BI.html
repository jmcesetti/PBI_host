<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PBI TSB</title>

    <style>
        #tsb_bi_root {
            width: 100%;
            height: 98%;
        }

        #tsb_bi_message_container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: Segoe UI, Arial, sans-serif;
            color: #323130;
            background-color: #ffffff;
        }
    </style>

    <script>
        geotab.addin.tsb_bi = function () {
            return {
                initialize: function (api, state, callback) {

                    api.getSession(function (session) {

                        const usuarioActual = (session.userName || "").toLowerCase().trim();

                        const listaBlanca = [
                            "ajm@cesetti.com.ar",
                            "mt@cesetti.com.ar"
                        ];

                        const autorizado = listaBlanca.includes(usuarioActual);

                        const root = document.createElement("div");
                        root.id = "tsb_bi_root";

                        if (autorizado) {

                            const iframe = document.createElement("iframe");
                            iframe.title = "PBI TSBSA";
                            iframe.width = "100%";
                            iframe.height = "100%";
                            iframe.frameBorder = "0";
                            iframe.allowFullscreen = true;
                            iframe.src = "https://app.powerbi.com/view?r=eyJrIjoiMDM3N2VkNDUtMGM5Ny00NmNkLTkwOTEtNGIyMTgyZWEyYWQzIiwidCI6ImJmYWIyOTY5LTMzN2EtNDE0NS1hN2E4LTRjZjNiNTIyYjc3ZSJ9";

                            root.appendChild(iframe);

                        } else {

                            const mensaje = document.createElement("div");
                            mensaje.id = "tsb_bi_message_container";

                            mensaje.innerHTML = `
                                <div>
                                    <h2 style="margin-bottom:10px;font-weight:600;">
                                        No tiene acceso para visualizar este elemento
                                    </h2>
                                    <div style="color:#605e5c;">
                                        Comuníquese con Pepe Argento
                                    </div>
                                </div>
                            `;

                            root.appendChild(mensaje);
                        }

                        document.body.appendChild(root);

                        callback();
                    });
                }
            };
        };
    </script>
</head>
<body>
</body>
</html>
