<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BI TSB</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: none;
            font-family: Segoe UI, Arial, sans-serif;
            background-color: #f3f2f1;
        }

        .container {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 40px 60px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card h2 {
            margin: 0 0 10px 0;
            font-weight: 600;
            color: #323130;
        }

        .card p {
            margin: 0;
            color: #605e5c;
        }
    </style>

    <script>
        geotab.addin.tsb_bi = function () {
            return {
                initialize: function (api, state, callback) {

                    api.getSession(function (session) {

                        const usuarioActual = (session.userName || "").toLowerCase().trim();

                        const listaBlanca = [
                            "ajm@cesetti.com.ar",
                            "mt@cesetti.com.ar"
                        ];

                        const autorizado = listaBlanca.includes(usuarioActual);

                        if (autorizado) {

                            const iframe = document.createElement("iframe");
                            iframe.style.width = "100%";
                            iframe.style.height = "100%";
                            iframe.style.border = "none";

                            iframe.src = "https://app.powerbi.com/view?r=eyJrIjoiMDM3N2VkNDUtMGM5Ny00NmNkLTkwOTEtNGIyMTgyZWEyYWQzIiwidCI6ImJmYWIyOTY5LTMzN2EtNDE0NS1hN2E4LTRjZjNiNTIyYjc3ZSJ9";

                            document.body.appendChild(iframe);

                        } else {

                            const container = document.createElement("div");
                            container.className = "container";

                            const card = document.createElement("div");
                            card.className = "card";

                            card.innerHTML = `
                                <h2>No tiene acceso para visualizar este elemento</h2>
                                <p>Comuníquese con Pepe Argento</p>
                            `;

                            container.appendChild(card);
                            document.body.appendChild(container);
                        }

                        document.body.style.display = "block";
                        callback();
                    });
                }
            };
        };
    </script>
</head>

<body>
</body>
</html>
