<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BI TSB</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            display: none;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #mensajeAcceso {
            margin-top: 120px;
            font-size: 18px;
            color: red;
        }
    </style>

    <script>
        geotab.addin.tsb_bi = function () {
            return {
                initialize: function (api, state, callback) {

                    api.getSession(function (session) {

                        const usuarioActual = (session.userName || "").toLowerCase().trim();

                        const listaBlanca = [
                            "ajm@cesetti.com.ar",
                            "mt@cesetti.com.ar"
                        ];

                        const autorizado = listaBlanca.includes(usuarioActual);

                        if (autorizado) {

                            const iframe = document.createElement("iframe");
                            iframe.width = "100%";
                            iframe.height = "100%";
                            iframe.frameBorder = "0";

                            iframe.src = "https://app.powerbi.com/view?r=eyJrIjoiMDM3N2VkNDUtMGM5Ny00NmNkLTkwOTEtNGIyMTgyZWEyYWQzIiwidCI6ImJmYWIyOTY5LTMzN2EtNDE0NS1hN2E4LTRjZjNiNTIyYjc3ZSJ9";

                            document.body.appendChild(iframe);

                        } else {

                            const mensaje = document.createElement("div");
                            mensaje.id = "mensajeAcceso";
                            mensaje.innerHTML = "<h2>No tiene acceso para visualizar este elemento</h2><p>Comuníquese con Pepe Argento</p>";

                            document.body.appendChild(mensaje);
                        }

                        document.body.style.display = "block";

                        callback();
                    });
                }
            };
        };
    </script>
</head>

<body>
</body>
</html>
