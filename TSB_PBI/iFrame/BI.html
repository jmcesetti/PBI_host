<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BI TSB</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }

        #mensajeAcceso {
            display: none;
            margin-top: 120px;
            font-size: 18px;
            color: red;
        }
    </style>

    <script>
        geotab.addin.tsb_bi = function () {
            return {
                initialize: function (api, state, callback) {

                    api.getSession(function (session) {

                        const usuarioActual = session.userName.toLowerCase();

                        const listaBlanca = [
                            "ajm@cesetti.com.ar",
                            "mt@cesetti.com.ar"
                        ];

                        const autorizado = listaBlanca.includes(usuarioActual);

                        if (autorizado) {

                            const iframe = document.createElement("iframe");
                            iframe.src = "TU_URL_REAL_DEL_REPORTE";
                            iframe.width = "100%";
                            iframe.height = "900px";
                            iframe.frameBorder = "0";

                            document.body.appendChild(iframe);

                        } else {

                            document.getElementById("mensajeAcceso").style.display = "block";
                        }

                        callback();
                    });
                }
            };
        };
    </script>
</head>

<body>

    <div id="mensajeAcceso">
        <h2>No tiene acceso para visualizar este elemento</h2>
        <p>Comuníquese con Pepe Argento</p>
    </div>

</body>
</html>
