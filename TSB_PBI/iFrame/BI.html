<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBI TSB</title>

    <style>
        #tsb_bi_iframe_custom_01 {
            width: 100%;
            height: 98%;
        }

        #tsb_bi_message_custom_01 {
            width: 100%;
            height: 98%;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: Segoe UI, Arial, sans-serif;
            color: #323130;
            background-color: #ffffff;
        }

        #tsb_bi_message_inner_custom_01 h2 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        #tsb_bi_message_text_custom_01 {
            color: #605e5c;
        }
    </style>

    <script>
        geotab.addin.tsb_bi = function () {
            return {
                initialize: function (api, state, callback) {

                    api.getSession(function (session) {

                        const tsbUsuarioActualCustom01 = (session.userName || "").toLowerCase().trim();

                        const tsbListaBlancaCustom01 = [                      
                            "fsoto@tsbsa.com.ar",
                            //"fderosa@tsbsa.com.ar",
                            //"kdelboni@tsbsa.com.ar",
                            "jm@cesetti.com.ar",
                            "mt@cesetti.com.ar",
                            "df@cesetti.com.ar"
                        ];

                        const tsbAutorizadoCustom01 = tsbListaBlancaCustom01.includes(tsbUsuarioActualCustom01);

                        const tsbIframeCustom01 = document.getElementById("tsb_bi_iframe_custom_01");
                        const tsbMensajeCustom01 = document.getElementById("tsb_bi_message_custom_01");

                        if (tsbAutorizadoCustom01) {
                            tsbIframeCustom01.style.display = "block";
                            tsbMensajeCustom01.style.display = "none";
                        } else {
                            tsbIframeCustom01.style.display = "none";
                            tsbMensajeCustom01.style.display = "flex";
                        }

                        callback();
                    });
                }
            };
        };
    </script>
</head>

<body id="tsb_bi_body_custom_01">

    <iframe 
        id="tsb_bi_iframe_custom_01"
        title="PBI TSBSA"
        width="100%"
        height="98%"
        src="https://app.powerbi.com/reportEmbed?reportId=b6351de8-cf65-4312-ae12-77053120e4bd&autoAuth=true&ctid=bfab2969-337a-4145-a7a8-4cf3b522b77e"
        allowfullscreen="true">
    </iframe>

    <div id="tsb_bi_message_custom_01">
        <div id="tsb_bi_message_inner_custom_01">
            <h2 id="tsb_bi_message_title_custom_01">
                PBI TSBSA
            </h2>
            <div id="tsb_bi_message_text_custom_01">
                No tiene acceso para visualizar este elemento
            </div>
        </div>
    </div>

</body>
</html>
