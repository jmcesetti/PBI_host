<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BI TSB</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: none;
            font-family: Segoe UI, Arial, sans-serif;
            background-color: #ffffff;
        }

        .mensaje-full {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #323130;
            font-size: 18px;
        }
    </style>

    <script>
        geotab.addin.tsb_bi = function () {
            return {
                initialize: function (api, state, callback) {

                    api.getSession(function (session) {

                        const usuarioActual = (session.userName || "").toLowerCase().trim();

                        const listaBlanca = [
                            "ajm@cesetti.com.ar",
                            "mt@cesetti.com.ar"
                        ];

                        const autorizado = listaBlanca.includes(usuarioActual);

                        if (autorizado) {

                            const iframe = document.createElement("iframe");
                            iframe.style.width = "100%";
                            iframe.style.height = "100%";
                            iframe.style.border = "none";

                            iframe.src = "https://app.powerbi.com/view?r=eyJrIjoiMDM3N2VkNDUtMGM5Ny00NmNkLTkwOTEtNGIyMTgyZWEyYWQzIiwidCI6ImJmYWIyOTY5LTMzN2EtNDE0NS1hN2E4LTRjZjNiNTIyYjc3ZSJ9";

                            document.body.appendChild(iframe);

                        } else {

                            const mensaje = document.createElement("div");
                            mensaje.className = "mensaje-full";
                            mensaje.innerHTML = `
                                <div>
                                    <h2 style="margin-bottom:10px;font-weight:600;">
                                        No tiene acceso para visualizar este elemento
                                    </h2>
                                    <div style="color:#605e5c;">
                                        Comuníquese con Pepe Argento
                                    </div>
                                </div>
                            `;

                            document.body.appendChild(mensaje);
                        }

                        document.body.style.display = "block";
                        callback();
                    });
                }
            };
        };
    </script>
</head>

<body>
</body>
</html>
