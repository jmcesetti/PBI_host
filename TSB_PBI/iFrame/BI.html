<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BI TSB</title>

    <style>
        #tsb_bi_root_wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: #ffffff;
            font-family: Segoe UI, Arial, sans-serif;
        }

        #tsb_bi_iframe_container {
            width: 100%;
            height: 100%;
        }

        #tsb_bi_access_denied {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #323130;
            font-size: 18px;
        }
    </style>

    <script>
        geotab.addin.tsb_bi = function () {
            return {
                initialize: function (api, state, callback) {

                    api.getSession(function (session) {

                        const usuarioActual = (session.userName || "").toLowerCase().trim();

                        const listaBlanca = [
                            "ajm@cesetti.com.ar",
                            "mt@cesetti.com.ar"
                        ];

                        const autorizado = listaBlanca.includes(usuarioActual);

                        const root = document.createElement("div");
                        root.id = "tsb_bi_root_wrapper";

                        if (autorizado) {

                            const iframeContainer = document.createElement("div");
                            iframeContainer.id = "tsb_bi_iframe_container";

                            const iframe = document.createElement("iframe");
                            iframe.style.width = "100%";
                            iframe.style.height = "100%";
                            iframe.style.border = "none";

                            iframe.src = "https://app.powerbi.com/view?r=eyJrIjoiMDM3N2VkNDUtMGM5Ny00NmNkLTkwOTEtNGIyMTgyZWEyYWQzIiwidCI6ImJmYWIyOTY5LTMzN2EtNDE0NS1hN2E4LTRjZjNiNTIyYjc3ZSJ9";

                            iframeContainer.appendChild(iframe);
                            root.appendChild(iframeContainer);

                        } else {

                            const denied = document.createElement("div");
                            denied.id = "tsb_bi_access_denied";

                            denied.innerHTML = `
                                <div>
                                    <h2 style="margin-bottom:10px;font-weight:600;">
                                        No tiene acceso para visualizar este elemento
                                    </h2>
                                    <div style="color:#605e5c;">
                                        Comuníquese con Pepe Argento
                                    </div>
                                </div>
                            `;

                            root.appendChild(denied);
                        }

                        document.body.appendChild(root);

                        callback();
                    });
                }
            };
        };
    </script>
</head>

<body>
</body>
</html>
