<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBI TSB</title>

    <style>
        #tsb_iframe_container {
            width: 100%;
            height: 98%;
        }

        #tsb_message_container {
            width: 100%;
            height: 98%;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: Segoe UI, Arial, sans-serif;
            color: #323130;
            background-color: #ffffff;
        }
    </style>

    <script>
        geotab.addin.tsb_bi = function () {
            return {
                initialize: function (api, state, callback) {

                    api.getSession(function (session) {

                        const usuarioActual = (session.userName || "").toLowerCase().trim();

                        const listaBlanca = [
                            "ajm@cesetti.com.ar",
                            "mt@cesetti.com.ar"
                        ];

                        const autorizado = listaBlanca.includes(usuarioActual);

                        const iframeContainer = document.getElementById("tsb_iframe_container");
                        const messageContainer = document.getElementById("tsb_message_container");

                        if (autorizado) {
                            iframeContainer.style.display = "block";
                            messageContainer.style.display = "none";
                        } else {
                            iframeContainer.style.display = "none";
                            messageContainer.style.display = "flex";
                        }

                        callback();
                    });
                }
            };
        };
    </script>
</head>

<body>

    <!-- EXACTAMENTE tu iframe original -->
    <iframe 
        id="tsb_iframe_container"
        title="PBI TSBSA"
        width="100%"
        height="98%"
        src="https://app.powerbi.com/view?r=eyJrIjoiMDM3N2VkNDUtMGM5Ny00NmNkLTkwOTEtNGIyMTgyZWEyYWQzIiwidCI6ImJmYWIyOTY5LTMzN2EtNDE0NS1hN2E4LTRjZjNiNTIyYjc3ZSJ9"
        frameborder="0"
        allowFullScreen="true">
    </iframe>

    <!-- Mensaje alternativo con mismo tamaño -->
    <div id="tsb_message_container">
        <div>
            <h2 style="margin-bottom:10px;font-weight:600;">
                No tiene acceso para visualizar este elemento
            </h2>
            <div style="color:#605e5c;">
                Comuníquese con Pepe Argento
            </div>
        </div>
    </div>

</body>
</html>
